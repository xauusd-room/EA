name: Build Articles

on:
  push:
    paths:
      - 'posts/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate articles.json
        run: |

          python << EOF

          import os
          import re
          import json

          articles = []

          for filename in os.listdir("posts"):

              if filename.endswith(".md"):

                  filepath = os.path.join("posts", filename)

                  with open(filepath,"r",encoding="utf-8") as f:
                      content = f.read()

                  title = re.search(r'title:\s*"?(.*?)"?\n',content)
                  description = re.search(r'description:\s*(.*?)\n',content)
                  date = re.search(r'date:\s*(.*?)\n',content)
                  thumbnail = re.search(r'thumbnail:\s*(.*?)\n',content)

                  articles.append({

                      "title": title.group(1) if title else "",

                      "description": description.group(1) if description else "",

                      "date": date.group(1)[:10] if date else "",

                      "thumbnail": thumbnail.group(1) if thumbnail else "",

                      "url": f"article.html?post={filename}"

                  })

          articles.sort(
              key=lambda x:x["date"],
              reverse=True
          )

          with open(
              "articles.json",
              "w",
              encoding="utf-8"
          ) as f:

              json.dump(
                  articles,
                  f,
                  ensure_ascii=False,
                  indent=2
              )

          EOF

      - name: Commit Changes
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add articles.json

          git diff --cached --quiet || git commit -m "Auto update articles"

          git push
