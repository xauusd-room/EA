<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD-EA</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#f5f6f8;
    font-family:"Microsoft YaHei",sans-serif;
    color:#333;
}

/* 顶部导航 */
header{
    width:100%;
    height:70px;
    background:#fff;
    border-bottom:1px solid #e5e5e5;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 50px;
}

.logo{
    font-size:32px;
    font-weight:700;
    color:#222;
}

.logo span{
    font-size:14px;
    color:#999;
    margin-left:10px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:#444;
    font-size:15px;
}

nav a:hover{
    color:#d4af37;
}

/* 主体网格布局 */
.container{
    width:1400px;
    max-width:95%;
    margin:30px auto;
    display:grid;
    grid-template-columns: 1fr 320px;
    gap:30px;
}

/* 左侧内容 */
.content{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
    display:flex;
    flex-direction:column;
    height:180px;
}

.card h3{
    font-size:20px;
    line-height:1.5;
    margin-bottom:12px;
    min-height:60px;
}

.card h3 a{
    text-decoration:none;
    color:#1a1a1a;
}
.card h3 a:hover{
    color:#d4af37;
}

.card p{
    color:#666;
    line-height:1.8;
    font-size:14px;
    flex:1;
}

.date{
    margin-top:auto;
    padding-top:15px;
    color:#999;
    font-size:13px;
}

/* 右侧栏 */
.sidebar{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.widget{
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.widget h2{
    font-size:18px;
    margin-bottom:15px;
}

.widget p{
    line-height:1.8;
    color:#666;
}

.widget ul{
    list-style:none;
}

.widget ul li{
    margin-bottom:12px;
}

.widget ul li a{
    text-decoration:none;
    color:#444;
}

.widget ul li a:hover{
    color:#d4af37;
}

.vip-btn{
    display:block;
    width:100%;
    text-align:center;
    background:#d4af37;
    color:#fff;
    padding:12px;
    border-radius:8px;
    text-decoration:none;
    margin-top:15px;
}

footer{
    text-align:center;
    padding:40px;
    color:#888;
}

@media(max-width:1200px){
    .content{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
    .content{
        grid-template-columns:1fr;
    }
    header{
        flex-direction:column;
        height:auto;
        padding:20px;
    }
    nav ul{
        margin-top:15px;
        flex-wrap:wrap;
        justify-content:center;
    }
}

.pagination{
    grid-column:1/-1;
    text-align:center;
    margin-top:30px;
}

.pagination button{
    padding:10px 16px;
    margin:0 5px;
    border:none;
    background:#fff;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.pagination button.active{
    background:#d4af37;
    color:#fff;
}
</style>
</head>

<body>
<header>
    <div class="logo">
        XAUUSD.EA
        <span>黄金分析 · 实盘交易 · EA资源</span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="#">最新分析</a></li>
            <li><a href="videos.html">最新视频</a></li>
            <li><a href="free-resources.html">免费资源</a></li>
            <li><a href="#">会员服务</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <!-- 左侧主内容区（包含文章列表和底部分页） -->
    <div>
        <div class="content" id="articleContainer">
            <!-- 这里由 JavaScript 动态生成卡片 -->
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 右侧侧边栏（已移出左侧区域，保持独立） -->
    <div class="sidebar">
        <div class="widget">
            <h2>关于我</h2>
            <p>
                ZACK<br><br>
                面向 EA 量化交易实践者的工具集。<br>
                覆盖黄金、外汇、加密货币、股指品种的 EA 交易策略落地。
            </p>
        </div>

        <div class="widget">
            <h2>最新文章</h2>
            <ul>
                <li><a href="#">黄金跌破关键支撑</a></li>
                <li><a href="#">黄金实盘拆单室</a></li>
                <li><a href="#">EA测评报告</a></li>
                <li><a href="#">本周行情展望</a></li>
            </ul>
        </div>

        <div class="widget">
            <h2>免费资源</h2>
            <p>
                供需交易法资料<br>
                交易日志模板<br>
                EA测评报告
            </p>
        </div>

        <div class="widget">
            <h2>会员服务</h2>
            <p>
                每日交易观点<br>
                EA资源下载<br>
                实盘复盘内容
            </p>
            <a href="#" class="vip-btn">加入会员</a>
        </div>
    </div>
</div>

<footer>
    © 2026 zackxau | Gold Trading Room
</footer>

<script>
const cardsPerPage = 6;
let currentPage = 1;
let allCards = [];

// 分页切换显示逻辑
function showPage(page){
    currentPage = page;
    allCards.forEach((card, index) => {
        if(index >= (page - 1) * cardsPerPage && index < page * cardsPerPage) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });
    createButtons();
}

// 动态创建分页按钮
function createButtons(){
    const totalPages = Math.ceil(allCards.length / cardsPerPage);
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';

    for(let i = 1; i <= totalPages; i++){
        const btn = document.createElement('button');
        btn.innerText = i;
        if(i === currentPage){
            btn.classList.add('active');
        }
        btn.onclick = () => showPage(i);
        pagination.appendChild(btn);
    }
}

// 异步抓取 JSON 数据并渲染
fetch('articles.json')
.then(res => res.json())
.then(data => {
    const container = document.getElementById('articleContainer');
    container.innerHTML = ''; // 清空容器

    data.forEach(article => {
        container.innerHTML += `
        <div class="card">
            <a href="${article.url}">
                <img src="${article.thumbnail}">
            </a>
            <div class="card-content">
                <h3>
                    <a href="${article.url}">
                        ${article.title}
                    </a>
                </h3>
                <p>${article.description}</p>
                <div class="date">
                    ${article.date}
                </div>
            </div>
        </div>
        `;
    });

    // 渲染完成后获取所有的卡片节点，并初始化分页
    allCards = document.querySelectorAll('.card');
    showPage(1);
})
.catch(err => {
    console.error("加载文章数据失败:", err);
});
</script>
</body>
</html>
