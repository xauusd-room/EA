            font-family: "Microsoft YaHei", Arial, sans-serif;

        /* 头部高级导航栏样式 */
        .header-container {

            align-items: center;

        nav ul {
            list-style: none;
            display: flex;
            gap: 24px;

            padding: 0;
        }
        nav ul li a {
            color: #aaaaaa;
            text-decoration: none;
            font-size: 14px;

            border-radius: 16px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 视频框架响应式长宽比安全控制 */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 标准黄金比例锁 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 页脚版权声明区域 */
