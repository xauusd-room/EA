<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>最新分析 - LOZENO™ 黄金作战室</title>

    <style>
        /* ==================== 1. 基础皮肤与大框架 ==================== */
        body { 
            background-color: #0b0b0b; 
            color: #ffffff; 
            font-family: "Microsoft YaHei", Arial, sans-serif; 
            margin: 0; 
        }
        
        .header-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 40px; 
            background: #000000; 
            border-bottom: 1px solid #1a1a1a;
        }
        .logo { 
            font-weight: bold; 
            font-size: 20px; 
            line-height: 1.2;
        }
        .logo a {
            text-decoration: none;
            color: #ffffff;
        }
        .logo span { 
            display: block; 
            font-size: 10px; 
            color: #888; 
            letter-spacing: 1px;
        }
        
        nav ul { 
            list-style: none; 
            display: flex; 
            gap: 24px; 
            margin: 0; 
            padding: 0; 
        }
        nav ul li a { 
            color: #aaaaaa; 
            text-decoration: none; 
            font-size: 14px; 
            transition: color 0.2s;
        }
        nav ul li a:hover { 
            color: #ffcc00; 
        }
        .nav-active {
            color: #ffffff !important;
            font-weight: bold;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 4px;
        }

        /* 主体布局（对齐视频页 1200px 骨架） */
        .container { 
            width: 1200px; 
            max-width: 95%; 
            margin: 40px auto; 
        }
        
        h1 { 
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 25px; 
            letter-spacing: 0.5px;
        }
        
        /* 独立黑金悬浮大盒子 */
        .analysis-box { 
            background: #121212; 
            border-radius: 16px; 
            padding: 30px; 
            border: 1px solid #1f1f1f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        /* ==================== 2. 精美卡片网格系统 ==================== */
        .article-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 24px; 
        }
        
        /* 深度复刻您的黑金立体卡片 */
        .article-card { 
            background: #1a1a1a; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #262626; 
            text-decoration: none; 
            color: inherit; 
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; 
        }
        
        /* 悬浮微移加高光金边 */
        .article-card:hover { 
            transform: translateY(-5px); 
            border-color: #ffcc00; 
            box-shadow: 0 8px 25px rgba(255, 204, 0, 0.15);
        }
        
        /* 图片盒子：防变形防拉伸 */
        .img-wrapper {
            width: 100%;
            height: 160px;
            overflow: hidden;
            background: #222;
            border-bottom: 1px solid #262626;
        }
        .card-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.3s ease;
        }
        /* 鼠标悬浮时图片轻微放大，极具视觉冲击力 */
        .article-card:hover .card-img {
            transform: scale(1.05);
        }
        
        .card-body { 
            padding: 18px; 
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-title { 
            font-size: 16px; 
            font-weight: bold; 
            margin: 0 0 10px 0; 
            line-height: 1.4; 
            color: #ffffff;
            transition: color 0.2s;
        }
        .article-card:hover .card-title {
            color: #ffcc00; 
        }
        .card-desc { 
            font-size: 13px; 
            color: #888; 
            line-height: 1.6; 
            margin: 0 0 14px 0; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: -webkit-box; 
            -webkit-line-clamp: 3; /* 最多显示 3 行摘要，超出自动变省略号 */
            -webkit-box-orient: vertical; 
            flex-grow: 1;
        }
        
        /* 卡片底部附加栏：展示日期与阅读更多 */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #262626;
            padding-top: 12px;
            margin-top: auto;
            font-size: 11px;
            color: #555;
        }
        .read-more {
            color: #ffcc00;
            font-weight: bold;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .article-card:hover .read-more {
            opacity: 1;
        }
        
        .lz-footer-copyright { 
            text-align: center; 
            padding: 60px 0 40px; 
            color: #555; 
            font-size: 12px; 
        }
    </style>
</head>

<body>

<header>
    <div class="header-container">
        <div class="logo">
            <a href="index.html">
                LOZENO.EA
                <span>STRATEGY.FIRST</span>
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="zuixinfenxi.html" class="nav-active">最新分析</a></li>
                <li><a href="videos.html">最新视频</a></li>
                <li><a href="free-resources.html">免费资源</a></li>
                <li><a href="javascript:void(0);" style="color: #444; cursor: not-allowed;">会员服务</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="container">
    <h1>最新分析</h1>

    <div class="analysis-box">
        <!-- 动态卡片容器 -->
        <div class="article-grid" id="articleGridContainer">
            <p style="color: #666; font-size: 14px;">正在检索云端数据仓库，加载全量历史分析报告...</p>
        </div>
    </div>
</div>

<div class="lz-footer-copyright">
    <p>© 2026 LOZENO™ | Quantitative Algorithmic Lab. All Rights Reserved.</p>
</div>

<!-- ==================== 3. 智能多轨数据对齐脚本 ==================== -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        fetch('articles.json')
            .then(response => {
                if (!response.ok) throw new Error('网络异常');
                return response.json();
            })
            .then(data => {
                const gridContainer = document.getElementById('articleGridContainer');
                gridContainer.innerHTML = ''; 

                if (data && data.length > 0) {
                    data.forEach(post => {
                        const card = document.createElement('a');
                        card.className = 'article-card';
                        card.href = post.url || '#';

                        // 💡 智能降级机制：如果 JSON 里没有填摘要或图片，使用优雅的默认值撑开版面
                        const thumbnailSrc = post.thumbnail || 'intro-bg.png';
                        const postTitle = post.title || '量化分析报告';
                        const postSummary = post.summary || post.description || '该报告暂未添加摘要描述，请点击进入正文查看深度数据...';
                        const postDate = post.date || '策略发布';

                        card.innerHTML = `
                            <div class="img-wrapper">
                                <img class="card-img" src="${thumbnailSrc}" alt="${postTitle}">
                            </div>
                            <div class="card-body">
                                <div class="card-title">${postTitle}</div>
                                <p class="card-desc">${postSummary}</p>
                                <div class="card-footer">
                                    <span>${postDate}</span>
                                    <span class="read-more">阅读正文 →</span>
                                </div>
                            </div>
                        `;
                        gridContainer.appendChild(card);
                    });
                } else {
                    gridContainer.innerHTML = '<p style="color: #666; font-size: 14px;">数据仓库中暂无历史分析报告</p>';
                }
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('articleGridContainer').innerHTML = '<p style="color: #ff3333; font-size: 14px;">全量文章加载失败，请刷新重试。</p>';
            });
    });
</script>

</body>
</html>
