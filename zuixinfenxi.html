<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端自适应视口安全锁 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>最新分析 - LOZENO™ 黄金作战室</title>

    <style>
        /* ==================== ❶ 完美同步：首页最顶级的导航栏 CSS 样式 ==================== */
        body { 
            background-color: #0b0b0b; 
            color: #ffffff; 
            font-family: "Microsoft YaHei", Arial, sans-serif; 
            margin: 0; 
        }

        header {
            background: #000000;
            height: 90px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .header-container {
            max-width: 1400px;
            width: 100%;
            height: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            line-height: 1.1;
        }
        .logo a {
            text-decoration: none;
            color: #ffffff;
        }

        .logo span {
            font-size: 11px;
            color: #717681;
            margin-top: 4px;
            letter-spacing: 1.5px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            align-items: center;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #717681;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        nav a:hover, .nav-active {
            color: #ffd043 !important; /* 悬浮或激活状态变成亮金色 */
        }

        nav ul li:last-child a {
            background: #ffd043;
            color: #000000;
            padding: 8px 22px;
            border-radius: 30px;
            font-weight: 700;
            display: inline-block;
        }

        nav ul li:last-child a:hover {
            background: #e0a927;
            transform: translateY(-1px);
        }

        /* 📱 手机端导航栏自适应安全防护盾（完美同步首页） */
        @media (max-width: 768px) {
            header { height: 70px !important; }
            .header-container {
                padding: 0 20px !important;
                display: flex !important;
                flex-direction: row !important;
                justify-content: space-between !important;
                align-items: center !important;
            }
            .logo {
                font-size: 20px !important;
                align-items: flex-start !important;
                text-align: left !important;
            }
            .logo span { font-size: 9px !important; margin-top: 2px !important; }
            nav ul li:not(:last-child) { display: none !important; }
            nav ul { gap: 0 !important; }
            nav ul li:last-child a {
                font-size: 12px !important;
                padding: 6px 14px !important;
                white-space: nowrap !important;
            }
        }

        /* ==================== ❷ 最新分析页：主体大盒子与卡片排版样式 ==================== */
        .container { 
            width: 1200px; 
            max-width: 95%; 
            margin: 40px auto; 
        }
        
        h1 { 
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 25px; 
            letter-spacing: 0.5px;
        }
        
        .analysis-box { 
            background: #121212; 
            border-radius: 16px; 
            padding: 30px; 
            border: 1px solid #1f1f1f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .article-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 24px; 
        }
        
        .article-card { 
            background: #1a1a1a; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #262626; 
            text-decoration: none; 
            color: inherit; 
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; 
        }
        .article-card:hover { 
            transform: translateY(-5px); 
            border-color: #ffd043; 
            box-shadow: 0 8px 25px rgba(255, 208, 67, 0.15);
        }
        
        .img-wrapper {
            width: 100%;
            height: 160px;
            overflow: hidden;
            background: #222;
            border-bottom: 1px solid #262626;
        }
        .card-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.3s ease;
        }
        .article-card:hover .card-img { transform: scale(1.05); }
        
        .card-body { 
            padding: 18px; 
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-title { 
            font-size: 16px; 
            font-weight: bold; 
            margin: 0 0 10px 0; 
            line-height: 1.4; 
            color: #ffffff;
            transition: color 0.2s;
        }
        .article-card:hover .card-title { color: #ffd043; }
        .card-desc { 
            font-size: 13px; 
            color: #888; 
            line-height: 1.6; 
            margin: 0 0 14px 0; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: -webkit-box; 
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; 
            flex-grow: 1;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #262626;
            padding-top: 12px;
            margin-top: auto;
            font-size: 11px;
            color: #555;
        }
        .read-more {
            color: #ffd043;
            font-weight: bold;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .article-card:hover .read-more { opacity: 1; }
        
        .lz-footer-copyright { text-align: center; padding: 60px 0 40px; color: #555; font-size: 12px; }
    </style>
</head>

<body>

<header>
    <div class="header-container">
        <!-- 💡 完美复刻首页大 Logo -->
        <div class="logo">
            <a href="index.html">
                LOZENO.EA
                <span>STRATEGY.FIRST</span>
            </a>
        </div>
        <!-- 💡 完美复刻首页导航，并将最新分析标记为激活高亮 -->
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="zuixinfenxi.html" class="nav-active">最新分析</a></li>
                <li><a href="videos.html">最新视频</a></li>
                <li><a href="free-resources.html">免费资源</a></li>
                <li><a href="javascript:void(0);">会员服务</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="container">
    <h1>最新分析</h1>
    <div class="analysis-box">
        <div class="article-grid" id="articleGridContainer">
            <p style="color: #666; font-size: 14px;">正在检索云端数据仓库，加载全量历史分析报告...</p>
        </div>
    </div>
</div>

<div class="lz-footer-copyright">
    <p>© 2026 LOZENO™ | Quantitative Algorithmic Lab. All Rights Reserved.</p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        fetch('articles.json')
            .then(response => {
                if (!response.ok) throw new Error('网络异常');
                return response.json();
            })
            .then(data => {
                const gridContainer = document.getElementById('articleGridContainer');
                gridContainer.innerHTML = ''; 

                if (data && data.length > 0) {
                    data.forEach(post => {
                        const card = document.createElement('a');
                        card.className = 'article-card';
                        card.href = post.url || '#';

                        const thumbnailSrc = post.thumbnail || 'intro-bg.png';
                        const postTitle = post.title || '量化分析报告';
                        const postSummary = post.summary || post.description || '该报告暂未添加摘要描述，请点击进入正文查看深度数据...';
                        const postDate = post.date || '策略发布';

                        card.innerHTML = `
                            <div class="img-wrapper">
                                <img class="card-img" src="${thumbnailSrc}" alt="${postTitle}">
                            </div>
                            <div class="card-body">
                                <div class="card-title">${postTitle}</div>
                                <p class="card-desc">${postSummary}</p>
                                <div class="card-footer">
                                    <span>${postDate}</span>
                                    <span class="read-more">阅读正文 →</span>
                                </div>
                            </div>
                        `;
                        gridContainer.appendChild(card);
                    });
                } else {
                    gridContainer.innerHTML = '<p style="color: #666; font-size: 14px;">数据仓库中暂无历史分析报告</p>';
                }
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('articleGridContainer').innerHTML = '<p style="color: #ff3333; font-size: 14px;">全量文章加载失败，请刷新重试。</p>';
            });
    });
</script>

</body>
</html>
