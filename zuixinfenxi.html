<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 💡 核心学习点 1：移动端自适应视口安全锁。这行代码是让你的网页在手机端不缩放、不变形的前提！ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOZENO™ - 官方量化门户</title>

    <style>
        /* 保持您截图中的暗黑优雅风格，可根据您的实际样式表微调 */
        body { background-color: #0b0b0b; color: #ffffff; font-family: sans-serif; margin: 0; }
        .header-container { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: #000; }
        .logo { font-weight: bold; font-size: 20px; }
        .logo span { display: block; font-size: 10px; color: #888; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 14px; }
        nav ul li a:hover { color: #ffcc00; }

        /* 卡片网格布局容器 */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .content { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* 借用您首页的卡片精致样式 */
        .article-card { background: #121212; border-radius: 8px; overflow: hidden; border: 1px solid #222; text-decoration: none; color: inherit; transition: transform 0.2s; }
        .article-card:hover { transform: translateY(-5px); border-color: #333; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .card-body { padding: 20px; }
        .card-title { font-size: 16px; font-weight: bold; margin: 0 0 10px 0; line-height: 1.4; }
        .card-desc { font-size: 12px; color: #888; line-height: 1.6; margin: 0; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

        .lz-footer-copyright { text-align: center; padding: 40px 0; color: #555; font-size: 12px; }
    </style>
</head>
<body>
<header>
    <div class="header-container">
        <!-- 左侧品牌 Logo 盒子 -->
        <div class="logo">
            LOZENO.EA
            <span>STRATEGY.FIRST</span>
        </div>
        <!-- 右侧导航菜单 -->
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="zuixinfenxi.html">最新分析</a></li>
                <li><a href="videos.html">最新视频</a></li>
                <li><a href="free-resources.html">免费资源</a></li>
                <li><a href="javascript:void(0);">会员服务</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- ==================== 🟨 纯净主体动态文章大容器 ==================== -->
<div class="container">
    <!-- 所有的文章卡片都会被 JavaScript 动态塞进这个盒子 -->
    <div class="content" id="articleContainer">
        <p style="color: #666;">正在加载全部最新分析文章...</p>
    </div>
</div>

<div class="lz-footer-copyright">
    <p>© 2026 LOZENO™ | Quantitative Algorithmic Lab. All Rights Reserved.</p>
</div>

<!-- ==================== ⚙️ 核心数据加载脚本 ==================== -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 抓取您项目根目录下的文章汇总数据 JSON
        fetch('articles.json')
            .then(response => {
                if (!response.ok) throw new Error('无法加载文章数据');
                return response.json();
            })
            .then(data => {
                const container = document.getElementById('articleContainer');
                container.innerHTML = ''; // 清空加载中提示

                // 确保数据存在
                if (data && data.length > 0) {
                    // 这里不做 slice(0, 4) 限制，直接 forEach 循环输出所有历史文章
                    data.forEach(post => {
                        const card = document.createElement('a');
                        card.className = 'article-card';
                        // post.url 对应 posts 文件夹中生成的具体文章 HTML 路径
                        card.href = post.url || '#';

                        // 动态拼装您的精美卡片结构（包含图片、标题、摘要）
                        card.innerHTML = `
                            <img class="card-img" src="${post.thumbnail || 'intro-bg.png'}" alt="${post.title}">
                            <div class="card-body">
                                <div class="card-title">${post.title || '无标题'}</div>
                                <p class="card-desc">${post.summary || post.description || '暂无摘要内容...'}</p>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<p style="color: #666;">暂无最新分析文章</p>';
                }
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('articleContainer').innerHTML = '<p style="color: #ff3333;">文章加载失败，请检查网络或稍后再试。</p>';
            });
    });
</script>
</body>
</html>
