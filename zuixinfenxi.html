<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端自适应视口安全锁 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>最新分析 - LOZENO™ 黄金作战室</title>

    <style>
        /* 全局暗黑背景，与视频页、首页完美克隆对齐 */
        body { 
            background-color: #0b0b0b; 
            color: #ffffff; 
            font-family: "Microsoft YaHei", Arial, sans-serif; 
            margin: 0; 
        }
        
        /* 头部高级导航栏样式 */
        .header-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 40px; 
            background: #000000; 
            border-bottom: 1px solid #1a1a1a;
        }
        .logo { 
            font-weight: bold; 
            font-size: 20px; 
            line-height: 1.2;
        }
        .logo a {
            text-decoration: none;
            color: #ffffff;
        }
        .logo span { 
            display: block; 
            font-size: 10px; 
            color: #888; 
            letter-spacing: 1px;
        }
        
        /* 导航菜单链接 */
        nav ul { 
            list-style: none; 
            display: flex; 
            gap: 24px; 
            margin: 0; 
            padding: 0; 
        }
        nav ul li a { 
            color: #aaaaaa; 
            text-decoration: none; 
            font-size: 14px; 
            transition: color 0.2s;
        }
        nav ul li a:hover { 
            color: #ffcc00; 
        }
        /* 让“最新分析”按钮处于高亮选中状态 */
        .nav-active {
            color: #ffffff !important;
            font-weight: bold;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 4px;
        }

        /* 主体容器居中（复刻自视频页 1200px 骨架） */
        .container { 
            width: 1200px; 
            max-width: 95%; 
            margin: 40px auto; 
        }
        
        h1 { 
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 25px; 
            letter-spacing: 0.5px;
        }
        
        /* 完美继承视频页的悬浮立体大盒子布局 */
        .analysis-box { 
            background: #121212; 
            border-radius: 16px; 
            padding: 30px; 
            border: 1px solid #1f1f1f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        /* 大盒子内部：融入首页标志性的卡片网格布局（响应式自适应列数） */
        .article-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 24px; 
        }
        
        /* 深度还原首页精致卡片细节 */
        .article-card { 
            background: #1a1a1a; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #262626; 
            text-decoration: none; 
            color: inherit; 
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; 
        }
        .article-card:hover { 
            transform: translateY(-5px); 
            border-color: #ffcc00; /* 悬浮时带上高端科技金边线 */
            box-shadow: 0 5px 15px rgba(255,204,0,0.1);
        }
        .card-img { 
            width: 100%; 
            height: 160px; 
            object-fit: cover; 
            background: #222; 
            border-bottom: 1px solid #262626;
        }
        .card-body { 
            padding: 18px; 
        }
        .card-title { 
            font-size: 16px; 
            font-weight: bold; 
            margin: 0 0 10px 0; 
            line-height: 1.4; 
            color: #ffffff;
            transition: color 0.2s;
        }
        .article-card:hover .card-title {
            color: #ffcc00; /* 悬浮时标题变金 */
        }
        .card-desc { 
            font-size: 13px; 
            color: #888; 
            line-height: 1.6; 
            margin: 0; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: -webkit-box; 
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; 
        }
        
        /* 页脚版权声明区域 */
        .lz-footer-copyright { 
            text-align: center; 
            padding: 60px 0 40px; 
            color: #555; 
            font-size: 12px; 
        }
    </style>
</head>

<body>

<header>
    <div class="header-container">
        <!-- 左侧品牌 Logo 盒子 -->
        <div class="logo">
            <a href="index.html">
                LOZENO.EA
                <span>STRATEGY.FIRST</span>
            </a>
        </div>
        <!-- 右侧全通互通导航菜单 -->
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="zuixinfenxi.html" class="nav-active">最新分析</a></li>
                <li><a href="videos.html">最新视频</a></li>
                <li><a href="free-resources.html">免费资源</a></li>
                <li><a href="javascript:void(0);" style="color: #444; cursor: not-allowed;">会员服务</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="container">

    <h1>最新分析</h1>

    <!-- 完美大盒子外壳 -->
    <div class="analysis-box">
        <!-- 所有的历史文章卡片网格都会被 JavaScript 动态无缝渲染进这里 -->
        <div class="article-grid" id="articleGridContainer">
            <p style="color: #666; font-size: 14px;">正在检索云端数据仓库，加载全量历史分析报告...</p>
        </div>
    </div>

</div>

<!-- 页脚封闭出口 -->
<div class="lz-footer-copyright">
    <p>© 2026 LOZENO™ | Quantitative Algorithmic Lab. All Rights Reserved.</p>
</div>

<!-- ==================== ⚙️ 核心全量文章自动渲染脚本 ==================== -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 请求根目录下的全局文章汇总 articles.json
        fetch('articles.json')
            .then(response => {
                if (!response.ok) throw new Error('网络异常，无法拉取文章列表数据');
                return response.json();
            })
            .then(data => {
                const gridContainer = document.getElementById('articleGridContainer');
                gridContainer.innerHTML = ''; // 成功连通后清空加载提示

                if (data && data.length > 0) {
                    // 彻底解除首页的 slice(0, 4) 数量限制，forEach 直接循环输出全部文章！
                    data.forEach(post => {
                        const card = document.createElement('a');
                        card.className = 'article-card';
                        // post.url 会被自动解析为 "article.html?post=文件名.md"
                        card.href = post.url || '#';

                        // 拼装精美卡片（兼容缩略图、标题、摘要数据）
                        card.innerHTML = `
                            <img class="card-img" src="${post.thumbnail || 'intro-bg.png'}" alt="${post.title}">
                            <div class="card-body">
                                <div class="card-title">${post.title || '未命名分析报告'}</div>
                                <p class="card-desc">${post.summary || post.description || '该量化分析报告暂未添加摘要描述...'}</p>
                            </div>
                        `;
                        gridContainer.appendChild(card);
                    });
                } else {
                    gridContainer.innerHTML = '<p style="color: #666; font-size: 14px;">数据仓库中暂无历史分析报告</p>';
                }
            })
            .catch(error => {
                console.error('加载失败原因:', error);
                document.getElementById('articleGridContainer').innerHTML = '<p style="color: #ff3333; font-size: 14px;">全量文章加载失败，请检查网络或刷新页面重试。</p>';
            });
    });
</script>

</body>
</html>
